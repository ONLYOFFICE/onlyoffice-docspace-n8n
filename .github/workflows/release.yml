name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{steps.version.outputs.version}}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          # mise uses GITHUB_TOKEN to interact with the GitHub API when installing
          # tools. This results in a 401 Unauthorized error if the action runs
          # outside of GitHub's infrastructure. As a workaround, only provide
          # GITHUB_TOKEN when running on github.com.
          GITHUB_TOKEN: ${{github.server_url == 'https://github.com' && github.token || ''}}

      - name: Store Version
        id: version
        run: echo "version=$(jq --raw-output ".version" package.json)" >> "$GITHUB_OUTPUT"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Package
        run: pnpm build

      - name: Archive Package
        run: pnpm pack

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: '*.tgz'
          if-no-files-found: error

  npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          # mise uses GITHUB_TOKEN to interact with the GitHub API when installing
          # tools. This results in a 401 Unauthorized error if the action runs
          # outside of GitHub's infrastructure. As a workaround, only provide
          # GITHUB_TOKEN when running on github.com.
          GITHUB_TOKEN: ${{github.server_url == 'https://github.com' && github.token || ''}}

      - name: Download Package
        uses: actions/download-artifact@v4
        with:
          name: package

      - name: Configure Registry
        run: pnpm config set registry https://registry.npmjs.org

      - name: Publish Package
        run: pnpm publish *.tgz --no-git-checks --provenance --access public

  gh:
    needs: [build, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{github.token}}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Package
        uses: actions/download-artifact@v4
        with:
          name: package

      - name: Create Release
        run: |
          gh release create "v${{needs.build.outputs.version}}" \
            --title "v${{needs.build.outputs.version}}" \
            --notes "See ${{github.server_url}}/${{github.repository}}/blob/master/CHANGELOG.md"

      - name: Upload Package
        run: gh release upload "v${{needs.build.outputs.version}}" *.tgz
